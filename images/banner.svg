<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#229954;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="400" fill="url(#bgGradient)"/>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="80" r="60" fill="#27ae60" opacity="0.1"/>
  <circle cx="1100" cy="320" r="80" fill="#e74c3c" opacity="0.1"/>
  <circle cx="950" cy="100" r="50" fill="#3498db" opacity="0.1"/>
  
  <!-- House Icon -->
  <g transform="translate(50, 120)">
    <polygon points="60,20 20,60 100,60" fill="#e74c3c"/>
    <rect x="30" y="60" width="60" height="50" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/>
    <rect x="40" y="75" width="15" height="15" fill="#3498db"/>
    <rect x="65" y="75" width="15" height="15" fill="#3498db"/>
    <rect x="50" y="95" width="20" height="15" fill="#95a5a6"/>
  </g>
  
  <!-- Main Text -->
  <text x="600" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="900" fill="#2c3e50" text-anchor="middle">
    บ้านเรา
  </text>
  <text x="750" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="900" fill="#27ae60" text-anchor="middle">
    DIY
  </text>
  
  <!-- English Brand -->
  <text x="600" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="600" fill="#27ae60" text-anchor="middle">
    Myhome DIY
  </text>
  
  <!-- Tagline -->
  <text x="600" y="200" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#7f8c8d" text-anchor="middle">
    "แต่งบ้าน ปลูกทุกสวย เลี้ยงลูก ใช้ของดี ชีวิตง่ายขึ้น"
  </text>
  
  <!-- Category Icons Row -->
  <g transform="translate(200, 240)">
    <!-- ของใช้ในบ้าน -->
    <g>
      <rect x="0" y="0" width="120" height="100" fill="white" rx="10" stroke="#27ae60" stroke-width="2"/>
      <text x="60" y="40" font-size="32" text-anchor="middle">🏠</text>
      <text x="60" y="70" font-family="Arial" font-size="14" text-anchor="middle" fill="#2c3e50">ของใช้ในบ้าน</text>
    </g>
    
    <!-- แม่และเด็ก -->
    <g transform="translate(150, 0)">
      <rect x="0" y="0" width="120" height="100" fill="white" rx="10" stroke="#e74c3c" stroke-width="2"/>
      <text x="60" y="40" font-size="32" text-anchor="middle">👶</text>
      <text x="60" y="70" font-family="Arial" font-size="14" text-anchor="middle" fill="#2c3e50">แม่และเด็ก</text>
    </g>
    
    <!-- สวน & ทุ่งหลาย -->
    <g transform="translate(300, 0)">
      <rect x="0" y="0" width="120" height="100" fill="white" rx="10" stroke="#27ae60" stroke-width="2"/>
      <text x="60" y="40" font-size="32" text-anchor="middle">🌸</text>
      <text x="60" y="70" font-family="Arial" font-size="14" text-anchor="middle" fill="#2c3e50">สวน & ทุ่งหลาย</text>
    </g>
    
    <!-- คาเฟ่ & อุปกรณ์ -->
    <g transform="translate(450, 0)">
      <rect x="0" y="0" width="120" height="100" fill="white" rx="10" stroke="#f39c12" stroke-width="2"/>
      <text x="60" y="40" font-size="32" text-anchor="middle">☕</text>
      <text x="60" y="70" font-family="Arial" font-size="14" text-anchor="middle" fill="#2c3e50">คาเฟ่ & อุปกรณ์</text>
    </g>
    
    <!-- ของมันส์ต้องมี -->
    <g transform="translate(600, 0)">
      <rect x="0" y="0" width="120" height="100" fill="white" rx="10" stroke="#3498db" stroke-width="2"/>
      <text x="60" y="40" font-size="32" text-anchor="middle">🎁</text>
      <text x="60" y="70" font-family="Arial" font-size="14" text-anchor="middle" fill="#2c3e50">ของมันส์ต้องมี</text>
    </g>
  </g>
  
  <!-- Tool Icons (Decorative) -->
  <g transform="translate(1050, 150)">
    <text x="0" y="0" font-size="40">🔨</text>
    <text x="0" y="50" font-size="40">🔧</text>
    <text x="0" y="100" font-size="40">🛠️</text>
  </g>
</svg>
