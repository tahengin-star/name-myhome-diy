<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#27ae60" stroke="#1e8449" stroke-width="3"/>
  
  <!-- Worker's Body -->
  <rect x="70" y="110" width="60" height="50" fill="#2980b9" rx="5"/>
  
  <!-- Worker's Head -->
  <circle cx="100" cy="85" r="25" fill="#f39c12"/>
  
  <!-- Hard Hat -->
  <ellipse cx="100" cy="65" rx="30" ry="12" fill="#f1c40f"/>
  <rect x="70" y="65" width="60" height="8" fill="#f1c40f"/>
  
  <!-- Eyes -->
  <circle cx="92" cy="82" r="3" fill="#2c3e50"/>
  <circle cx="108" cy="82" r="3" fill="#2c3e50"/>
  
  <!-- Smile -->
  <path d="M 90 92 Q 100 98 110 92" stroke="#2c3e50" stroke-width="2" fill="none"/>
  
  <!-- Tool Belt -->
  <rect x="70" y="130" width="60" height="8" fill="#34495e"/>
  
  <!-- Hammer -->
  <rect x="78" y="145" width="4" height="20" fill="#95a5a6"/>
  <rect x="72" y="140" width="16" height="8" fill="#7f8c8d" rx="2"/>
  
  <!-- Wrench -->
  <circle cx="120" cy="150" r="4" fill="#95a5a6"/>
  <rect x="118" y="148" width="4" height="15" fill="#95a5a6"/>
  
  <!-- Text Banner -->
  <rect x="20" y="170" width="160" height="25" fill="white" opacity="0.9" rx="5"/>
  <text x="100" y="188" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#27ae60" text-anchor="middle">Myhome DIY</text>
</svg>
